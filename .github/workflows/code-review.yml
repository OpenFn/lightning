name: Code Review

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  code-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        id: claude-review
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: true
          prompt: |
            Use the Skill tool to invoke the "review" skill to review this pull request.
            Review only the changes introduced by this PR.
            Post your findings as a structured comment.
          claude_args: |
            --max-turns 50
            --model claude-opus-4-6

      - name: Post status comment if Claude did not comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const outcome = '${{ steps.claude-review.outcome }}';
            const hasClaudeComment = comments.some(c =>
              c.body && c.body.includes('Code Review') && c.user.type === 'Bot'
            );
            if (!hasClaudeComment) {
              const isFailure = outcome === 'failure' || outcome === 'cancelled';
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: isFailure
                  ? [
                      '## Code Review',
                      '',
                      '⚠️ **Automated code review did not complete.**',
                      '',
                      'Claude hit the max-turns limit or encountered an error before posting findings.',
                      '',
                      'See the [workflow run](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for details.',
                    ].join('\n')
                  : [
                      '## Code Review',
                      '',
                      '⚠️ The review completed but no findings comment was posted.',
                      '',
                      'See the [workflow run](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') for the raw Claude output.',
                    ].join('\n'),
              });
            }

      - name: Fail the check if review failed
        if: steps.claude-review.outcome == 'failure'
        run: |
          echo "::error::Code review did not complete successfully. See PR comments for details."
          exit 1
