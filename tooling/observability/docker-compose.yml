services:
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: lgtm
    ports:
      - '3000:3000'   # Grafana UI
      - '9090:9090'   # Prometheus UI (handy for debugging scrape targets)
      - '4317:4317'   # OTLP gRPC (for future tracing)
      - '4318:4318'   # OTLP HTTP (for future tracing)
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - ./prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - otel-data:/data
    restart: unless-stopped

volumes:
  otel-data: {}
