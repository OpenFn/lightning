name: simple webhook
jobs:
  greet:
    name: greet
    adaptor: '@openfn/language-common@latest'
    credential: null
    body: |
      fn(state => state)
triggers:
  webhook:
    type: webhook
    enabled: true
edges:
  webhook->greet:
    source_trigger: webhook
    target_job: greet
    condition_type: always
    enabled: true
