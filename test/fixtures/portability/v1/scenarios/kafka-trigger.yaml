name: kafka trigger
jobs:
  consume:
    name: consume
    adaptor: '@openfn/language-common@latest'
    credential: null
    body: |
      fn(state => state)
triggers:
  kafka:
    type: kafka
    enabled: true
    kafka_configuration:
      hosts:
        - 'localhost:9092'
        - 'localhost:9093'
      topics:
        - events
      initial_offset_reset_policy: earliest
      connect_timeout: 30
edges:
  kafka->consume:
    source_trigger: kafka
    target_job: consume
    condition_type: always
    enabled: true
