name: js expression edge
jobs:
  source-step:
    name: source step
    adaptor: '@openfn/language-common@latest'
    credential: null
    body: |
      fn(state => state)
  target-step:
    name: target step
    adaptor: '@openfn/language-common@latest'
    credential: null
    body: |
      fn(state => state)
triggers:
  webhook:
    type: webhook
    enabled: true
edges:
  webhook->source-step:
    source_trigger: webhook
    target_job: source-step
    condition_type: always
    enabled: true
  source-step->target-step:
    source_job: source-step
    target_job: target-step
    condition_type: js_expression
    condition_label: Only when payload present
    condition_expression: |
      !!state.data && state.data.length > 0
    enabled: true
