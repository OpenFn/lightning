name: canonical-project
description: |
  Project-level kitchen sink for the v2 portability format.
  Pending definitive examples; coverage assertion enforces completeness.
collections:
  patients:
    description: Per-patient state keyed by national-id
  encounters:
    description: Encounter records
credentials:
  http-prod:
    schema: http
  http-staging:
    schema: http
  postgres-warehouse:
    schema: postgresql
workflows:
  canonical-workflow:
    name: canonical workflow
    steps:
      - id: webhook
        type: webhook
        enabled: true
        openfn:
          webhook_reply: after_completion
        next: ingest
      - id: ingest
        name: ingest
        adaptor: '@openfn/language-http@latest'
        expression: |
          fn(state => state)
        configuration: http-prod
openfn:
  project_id: 00000000-0000-0000-0000-000000000000
  endpoint: https://app.openfn.org
