id: kafka-trigger
name: kafka trigger
steps:
  - id: kafka
    name: kafka
    enabled: true
    type: kafka
    openfn:
      kafka:
        hosts:
          - 'localhost:9092'
          - 'localhost:9093'
        topics:
          - events
        initial_offset_reset_policy: earliest
        connect_timeout: 30
    next: consume
  - id: consume
    name: consume
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
