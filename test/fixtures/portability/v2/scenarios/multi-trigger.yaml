id: multi-trigger
name: multi trigger
start: cron
steps:
  - id: cron
    name: cron
    enabled: true
    type: cron
    cron_expression: '*/5 * * * *'
    next:
      shared-step:
        condition: always
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    next:
      shared-step:
        condition: always
  - id: shared-step
    name: shared step
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
