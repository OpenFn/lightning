id: multi-trigger
name: multi trigger
steps:
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    next: shared-step
  - id: cron
    name: cron
    enabled: true
    type: cron
    openfn:
      cron: '*/5 * * * *'
    next: shared-step
  - id: shared-step
    name: shared step
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
