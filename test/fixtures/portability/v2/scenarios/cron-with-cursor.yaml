id: cron-with-cursor
name: cron with cursor
steps:
  - id: cron
    name: cron
    enabled: true
    type: cron
    cron_expression: '0 6 * * *'
    openfn:
      cron_cursor: cursor-step
    next: cursor-step
  - id: cursor-step
    name: cursor step
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
