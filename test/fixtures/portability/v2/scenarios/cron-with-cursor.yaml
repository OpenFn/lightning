id: cron-with-cursor
name: cron with cursor
start: cron
steps:
  - id: cron
    name: cron
    enabled: true
    type: cron
    cron_expression: '0 6 * * *'
    cron_cursor: cursor-step
    next:
      cursor-step:
        condition: always
  - id: cursor-step
    name: cursor step
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
