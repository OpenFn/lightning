id: cron-with-cursor
name: cron with cursor
steps:
  - id: cron
    name: cron
    enabled: true
    type: cron
    openfn:
      cron: '0 6 * * *'
      cron_cursor: cursor-step
    next: cursor-step
  - id: cursor-step
    name: cursor step
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
