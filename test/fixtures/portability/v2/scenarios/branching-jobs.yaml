id: branching-jobs
name: branching jobs
steps:
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    next: fan-out
  - id: fan-out
    name: fan out
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next:
      branch-a:
        condition: '!state.errors'
      branch-b:
        condition: '!!state.errors'
  - id: branch-a
    name: branch a
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
  - id: branch-b
    name: branch b
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
