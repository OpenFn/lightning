id: js-expression-edge
name: js expression edge
steps:
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    next: source-step
  - id: source-step
    name: source step
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next:
      target-step:
        condition: |
          !!state.data && state.data.length > 0
        label: Only when payload present
  - id: target-step
    name: target step
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
