id: canonical-workflow
name: canonical workflow
steps:
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    openfn:
      webhook_reply: after_completion
    next: ingest
  - id: cron
    name: cron
    enabled: false
    type: cron
    openfn:
      cron: '0 6 * * *'
      cron_cursor: ingest
    next: ingest
  - id: kafka
    name: kafka
    enabled: true
    type: kafka
    openfn:
      kafka:
        hosts:
          - 'localhost:9092'
        topics:
          - dummy
        initial_offset_reset_policy: earliest
        connect_timeout: 30
    next: ingest
  - id: ingest
    name: ingest
    adaptors:
      - '@openfn/language-http@latest'
    expression: |
      fn(state => state)
    configuration: alice@example.com|http creds
    next:
      maybe-skip:
        condition: |
          !state.errors && state.data
        label: Skip when no errors
        disabled: true
      report-failure:
        condition: '!!state.errors'
      transform:
        condition: '!state.errors'
  - id: transform
    name: transform
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next: load
  - id: report-failure
    name: report failure
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next: load
  - id: maybe-skip
    name: maybe skip
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
  - id: load
    name: load
    adaptors:
      - '@openfn/language-common@latest'
    expression: |
      fn(state => state)
