id: canonical-workflow
name: canonical workflow
schema_version: '4.0'
start: cron
steps:
  - id: cron
    name: cron
    enabled: false
    type: cron
    cron_expression: '0 6 * * *'
    cron_cursor: ingest
    next:
      ingest:
        condition: always
  - id: kafka
    name: kafka
    enabled: true
    type: kafka
    hosts:
      - 'localhost:9092'
    topics:
      - dummy
    initial_offset_reset_policy: earliest
    connect_timeout: 30
    next:
      ingest:
        condition: always
  - id: webhook
    name: webhook
    enabled: true
    type: webhook
    webhook_reply: after_completion
    next:
      ingest:
        condition: always
  - id: ingest
    name: ingest
    adaptor: '@openfn/language-http@latest'
    expression: |
      fn(state => state)
    configuration: alice@example.com|http creds
    next:
      maybe-skip:
        condition: |
          !state.errors && state.data
        label: Skip when no errors
        disabled: true
      report-failure:
        condition: on_job_failure
      transform:
        condition: on_job_success
  - id: transform
    name: transform
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next:
      load:
        condition: always
  - id: report-failure
    name: report failure
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
    next:
      load:
        condition: always
  - id: maybe-skip
    name: maybe skip
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
  - id: load
    name: load
    adaptor: '@openfn/language-common@latest'
    expression: |
      fn(state => state)
